<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PLA Bäckerei</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      color: #111111;
    }

    .container {
      width: 100%;
      max-width: 780px;
    }

    .logo {
      width: 100%;
      max-width: 620px;
      display: block;
      margin: 0 auto 34px;
    }

    .subtitle {
      font-size: clamp(24px, 3vw, 42px);
      margin-bottom: 42px;
      letter-spacing: 0.02em;
    }

    .services {
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 800;
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .dot {
      color: #29bde8;
      padding: 0 14px;
    }

    .location {
      display: inline-block;
      font-size: clamp(20px, 3vw, 34px);
      margin-bottom: 48px;
      color: #111111;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .location:hover {
      opacity: 0.65;
    }

    .whatsapp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 18px;

      background: #1dcf59;
      color: white;
      text-decoration: none;

      padding: 24px 38px;
      border-radius: 26px;

      font-size: clamp(24px, 3vw, 38px);
      font-weight: 700;

      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.16);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        opacity 0.2s ease;
    }

    .whatsapp:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 42px rgba(0, 0, 0, 0.2);
      opacity: 0.96;
    }

    .whatsapp span {
      display: block;
      margin-top: 6px;
      font-size: 0.72em;
      font-weight: 400;
    }

    .coming {
      margin-top: 60px;
      color: #aaaaaa;
      font-size: clamp(20px, 2vw, 28px);
      letter-spacing: 0.3em;
    }

    @media (max-width: 640px) {
      .services {
        line-height: 1.6;
      }

      .dot {
        padding: 0 8px;
      }

      .whatsapp {
        width: 100%;
        padding: 22px 24px;
      }
    }
  </style>
</head>

<body>

  <main class="container">

    <img src="logo.png" alt="PLA Bäckerei Logo" class="logo" />

    <p class="subtitle">
      Etwas Besonderes entsteht.
    </p>

    <p class="services">
      3D-Druck
      <span class="dot">•</span>
      Design
      <span class="dot">•</span>
      Souvenirs
    </p>

    <a
      class="location"
      href="https://maps.google.com/?q=Linzerstraße+11,+4810+Gmunden"
      target="_blank"
    >
      📍 Salzkammergut, Österreich
    </a>

    <br />

    <a
      class="whatsapp"
      href="https://wa.me/436767907753"
      target="_blank"
    >
      💬
      <div>
        Kontakt via WhatsApp
        <span>+43 676 7907753</span>
      </div>
    </a>

    <p class="coming">
      Coming soon.
    </p>

  </main>

</body>
</html>
